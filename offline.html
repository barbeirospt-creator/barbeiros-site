<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbeiros.pt - Offline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            background-color: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 32px;
        }
        h1 { margin-bottom: 12px; font-size: 24px; }
        p { color: #64748b; line-height: 1.5; max-width: 300px; margin-bottom: 32px; }
        button {
            background-color: #1a1a1a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="logo">B</div>
    <h1>Você está offline</h1>
    <p>Algumas funcionalidades podem não estar disponíveis. Tente novamente quando a conexão for restaurada.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
</body>
</html>
